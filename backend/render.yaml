databases:
  - name: dsa-tracker-db
    plan: free
    databaseName: dsa_tracker
    user: dsa_tracker_user

services:
  - type: web
    name: dsa-tracker-api
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dsa-tracker-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ORIGINS
        value: https://dsa-tracker.vercel.app
